# Render Blueprint — https://render.com/docs/blueprint-spec
# Dashboard: New > Blueprint > repo ulang

databases:
  - name: it-navigator-db
    databaseName: it_navigator
    user: it_navigator
    plan: free

services:
  - type: web
    name: it-navigator
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: NODE_VERSION
        value: "20"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: SECURE_SSL_REDIRECT
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: it-navigator-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LANGUAGE_CODE
        value: uz
      - key: TIME_ZONE
        value: Asia/Tashkent
